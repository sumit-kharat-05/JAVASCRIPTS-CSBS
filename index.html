<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button onclick="alertShow()" id="btn">Show Alert</button>

    <input type="text" name="" id="name" placeholder="Enter Your Name" />
    <input type="text" name="" id="who" placeholder="Your Enter Name" />
    <br /><br />
    <button id="b1" onclick="getValue()">Get Value</button>
    <button id="b2" onclick="setValue()">Set Value</button>
    <button id="b3" onclick="removeValue()">Remove Value</button>
    <button id="b3" onclick="copyValue()">Copy Value</button>
    <br /><br />
    <hr />
    <input type="password" name="" id="pin" placeholder="Enter Your Pin" />
    <button type="submit" onclick="checkPin()">Submit</button>
    <br /><br />
    <input
      type="text"
      name="name"
      id="i1"
      oninput="hndlInputField(event)"
      onkeyup="hndlHandledKeyUp()"
      onkeydown="hndlHandledKeyDown()"
      onkeypress="hndlKeyPress()"
      onfocus="hndlFocus()"
      onblur="hndlBlur(event)"
      placeholder="Enter Your Name :"
    />
    <input
      type="text"
      name="age"
      id="i2"
      oninput="hndlInputField(event)"
      onblur="hndlBlur(event)"
      placeholder="Enter Your Age :"
    />
    <input
      type="text"
      name="email"
      id="i3"
      oninput="hndlInputField(event)"
      placeholder="Enter Your Email :"
    />
    <br /><br />
    <input type="text" name="" id="usrName" placeholder="Enter User Name" />
    <br /><br />
    <button onclick="updtStyle()">Update Style</button>
    <br /><br />
    <input
      type="range"
      name=""
      id="rng"
      step="10"
      oninput="hndlRange(event)"
      max="300"
      min="110"
    />
    <br /><br />
    <input type="text" id="user" placeholder="Enter username" />
    <span id="userMsg" style="display: none; color: red"></span>
    <br /><br />
    <input
      type="text"
      name=""
      id=""
      onblur="returnPosition()"
      placeholder="Enter position"
    />
  </body>
  <script src="variable.js"></script>
  <script src="datatypes.js"></script>
  <script src="function.js"></script>
  <script src="arithmatic-operators.js"></script>
  <script src="assignment-operators.js"></script>
  <script src="logical-operators.js"></script>
  <script src="conditional-statement.js"></script>
  <script src="ternary-operators.js"></script>
  <script src="type-operators.js"></script>
  <script src="string-methods.js"></script>
  <script src="template-literals.js"></script>
  <script src="loops.js"></script>
  <script src="break-continue.js"></script>
  <script src="input-field.js"></script>
  <script src="input-fields-events.js"></script>
  <script src="input-field-style.js"></script>
  <script src="input-field-validation.js"></script>
  <script src="array.js"></script>
</html>
